apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: counter-lab
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
