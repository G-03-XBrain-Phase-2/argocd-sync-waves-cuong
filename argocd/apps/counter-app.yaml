apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: counter-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/G-03-XBrain-Phase-2/argocd-sync-waves-cuong
    targetRevision: HEAD
    path: manifests/counter-app
  destination:
    server: https://kubernetes.default.svc
    namespace: counter-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
