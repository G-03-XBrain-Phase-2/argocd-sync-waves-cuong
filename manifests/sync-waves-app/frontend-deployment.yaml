apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: database-frontend-lab
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: manhcuong139/portfolio:latest 
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: app-config
